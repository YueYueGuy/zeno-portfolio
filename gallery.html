  <style>
    :root {
      --bg: #fafafa;
      --text: #111111;
      --muted: rgba(17, 17, 17, 0.56);
      --soft: rgba(17, 17, 17, 0.36);
      --line: rgba(17, 17, 17, 0.08);
      --surface: #f2f2ef;
      --glass: rgba(14, 14, 14, 0.18);
      --overlay-text: rgba(255,255,255,0.78);
      --overlay-soft: rgba(255,255,255,0.58);
      --overlay-title: rgba(255,255,255,0.74);
      --overlay-arrow: rgba(255,255,255,0.54);
      --focus-ring: rgba(224, 86, 114, 0.24);
      --radius: 10px;
    }

    html.lenis, html.lenis body {
      height: auto;
    }

    * { box-sizing: border-box; }
    html { }

    body {
      margin: 0;
      font-family: 'Hubot Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      scrollbar-width: none;
      overflow: hidden;
    }

    body.theme-night {
      --bg: #080808;
      --text: #d6d6d6;
      --muted: rgba(214, 214, 214, 0.64);
      --soft: rgba(214, 214, 214, 0.42);
      --line: rgba(255, 255, 255, 0.08);
      --surface: #121212;
      --glass: rgba(255, 255, 255, 0.08);
      --overlay-text: rgba(255,255,255,0.9);
      --overlay-soft: rgba(255,255,255,0.66);
      --overlay-title: rgba(255,255,255,0.86);
      --overlay-arrow: rgba(255,255,255,0.7);
      --focus-ring: rgba(122, 143, 166, 0.42);
    }

    body::-webkit-scrollbar { display: none; }

    body.embedded-gallery {
      min-height: 100vh;
      min-height: 100dvh;
    }

    a { color: inherit; text-decoration: none; }
    button { font: inherit; }

    .page {
      height: 100vh;
      height: 100dvh;
      padding: 8px clamp(6px, 0.75vw, 12px) 10px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      overflow: hidden;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 4px 0 6px;
      background: var(--bg);
    }

    body.theme-night .topbar {
      background: var(--bg);
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      border-radius: 999px;
    }

    .brand-mark {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }

    .brand-text {
      display: grid;
      gap: 2px;
      line-height: 1;
    }

    .brand-name {
      font-size: 0.92rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .brand-sub {
      font-size: 0.7rem;
      color: var(--muted);
    }

    .home-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 14px;
      border-radius: 999px;
      background: rgba(255,255,255,0.82);
      box-shadow: inset 0 0 0 1px var(--line);
      font-size: 0.76rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .brand:focus-visible,
    .home-link:focus-visible {
      outline: none;
      box-shadow: 0 0 0 2px var(--focus-ring);
    }

    body.theme-night .home-link {
      background: rgba(255,255,255,0.05);
      box-shadow: inset 0 0 0 1px var(--line);
    }

    .gallery-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      overflow: hidden;
      border-radius: 18px;
      background: var(--bg);
      border: 1px solid var(--line);
      will-change: transform;
      isolation: isolate;
    }

    body.theme-night .gallery-shell {
      background: var(--bg);
    }

    .gallery-scroll {
      position: relative;
      height: 100%;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 6px 0 14px;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    .gallery-scroll::-webkit-scrollbar {
      display: none;
    }

    .gallery-stream {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 18px;
      padding: 0 6px;
      align-items: start;
    }

    .gallery-card {
      position: relative;
      display: block;
      width: 100%;
      margin: 0;
      overflow: hidden;
      border-radius: 16px;
      background: var(--surface);
      will-change: transform, opacity;
    }

    .gallery-card:hover {
      transform: translateY(-4px);
      transition: transform 260ms cubic-bezier(0.19, 1, 0.22, 1);
    }

    .gallery-card:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
      transform: translateY(-4px);
      transition: transform 260ms cubic-bezier(0.19, 1, 0.22, 1);
    }

    .gallery-card-media {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      overflow: hidden;
      background: var(--surface);
    }

    .gallery-card img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .gallery-card img[data-src] {
      background: var(--surface);
    }

    @media (hover: hover) {
      .gallery-card img {
        transition: transform 600ms cubic-bezier(0.19, 1, 0.22, 1);
      }

      .gallery-card:hover img {
        transform: scale(1.03);
      }

      .gallery-card:focus-visible img {
        transform: scale(1.03);
      }
    }

    .plyr {
      --plyr-color-main: #E05672;
    }
    .gallery-card-media .plyr {
      width: 100%;
      height: 100%;
      border-radius: 0;
    }
    .gallery-card-media .plyr video {
      object-fit: cover;
    }

    .gallery-card-overlay {
      position: absolute;
      inset: auto 12px 12px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 32px;
      padding: 0 10px 0 11px;
      border-radius: 999px;
      color: var(--overlay-text);
      background: var(--glass);
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 220ms ease, transform 220ms ease;
      pointer-events: none;
    }

    .gallery-card:hover .gallery-card-overlay,
    .gallery-card:focus-visible .gallery-card-overlay {
      opacity: 1;
      transform: translateY(0);
      background: rgba(14, 14, 14, 0.6);
    }

    .gallery-card-meta {
      display: flex;
      align-items: baseline;
      gap: 8px;
      min-width: 0;
    }

    .gallery-card-series {
      font-size: 0.58rem;
      font-weight: 650;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--overlay-soft);
      white-space: nowrap;
    }

    .gallery-card-title {
      margin: 0;
      min-width: 0;
      font-size: 0.72rem;
      line-height: 1.1;
      letter-spacing: -0.015em;
      font-weight: 560;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--overlay-title);
    }

    .gallery-card-arrow {
      flex-shrink: 0;
      width: 14px;
      height: 14px;
      color: var(--overlay-arrow);
    }

    .gallery-card-arrow svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .gallery-loader {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--soft);
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      background: color-mix(in srgb, var(--bg) 86%, transparent);
      z-index: 5;
      transition: opacity 220ms ease;
    }

    .gallery-loader[hidden] {
      display: none;
    }

    @media (max-width: 1200px) {
      .gallery-stream {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 820px) {
      .page { padding-inline: 6px; }
      .topbar {
        flex-direction: column;
        align-items: flex-start;
      }
      .gallery-shell {
        border-radius: 14px;
      }
      .gallery-stream {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
        padding-inline: 4px;
      }
      .gallery-card {
        border-radius: 13px;
        margin: 0;
      }
      .gallery-card-overlay {
        inset: auto 8px 8px 8px;
      }
    }

    @media (max-width: 560px) {
      .gallery-stream {
        grid-template-columns: 1fr;
      }
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body.embedded-gallery .page {
      padding: 0;
      gap: 0;
    }

    body.embedded-gallery .topbar {
      display: none;
    }

  </style>
</head>

            "body": "GAMECORES is strongest when it feels immersive without losing structure. The project builds a vivid gaming identity, but it still needs the product discipline of hierarchy, readability, and flow.\n\nThat tension makes it ideal for a Behance-style case study, because the narrative can show how the visual world supports the product rather than overpowering it."
